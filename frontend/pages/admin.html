<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Dashboard | Ceylone Zimt</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body style="background:var(--dark)">
<div class="toast" id="toast"></div>

<!-- Admin Login -->
<div id="adminLogin" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:400px">
    <div class="logo" style="text-align:center;margin-bottom:2rem;font-size:1.8rem">Ceylone<span>Zimt</span> <span style="color:var(--muted);font-size:1rem;font-family:'Inter',sans-serif">Admin</span></div>
    <div class="auth-card" style="background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem">
      <form onsubmit="adminLogin(event)">
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label">Email</label>
          <input class="form-input" id="aEmail" type="email" required placeholder="admin@example.com" style="width:100%"/>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem">
          <label class="form-label">Password</label>
          <input class="form-input" id="aPass" type="password" required placeholder="••••••••" style="width:100%"/>
        </div>
        <button type="submit" class="btn-primary" style="width:100%">Enter Dashboard</button>
      </form>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" class="admin-layout" style="display:none">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="logo" style="font-size:1.2rem">Ceylone<span>Zimt</span></div>
    <ul class="admin-nav" style="margin-top:2rem">
      <li><a href="#" class="active" onclick="showPanel('overviewPanel', this)">📊 Overview</a></li>
      <li><a href="#" onclick="showPanel('ordersPanel', this)">📦 Orders</a></li>
      <li><a href="#" onclick="showPanel('productsPanel', this)">🌿 Products</a></li>
      <li><a href="#" onclick="showPanel('customersPanel', this)">👥 Customers</a></li>
      <li style="margin-top:auto;padding-top:2rem"><a href="#" onclick="adminLogout()">🚪 Logout</a></li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="admin-content">

    <!-- Overview Panel -->
    <div id="overviewPanel">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <span id="adminDateDisplay" style="color:var(--muted);font-size:.85rem"></span>
      </div>
      <div class="stats-cards" id="statsCards">
        <div class="stat-card"><div class="stat-card-num">—</div><div class="stat-card-label">Total Orders</div></div>
        <div class="stat-card"><div class="stat-card-num">—</div><div class="stat-card-label">Revenue</div></div>
        <div class="stat-card"><div class="stat-card-num">—</div><div class="stat-card-label">Pending</div></div>
        <div class="stat-card"><div class="stat-card-num">—</div><div class="stat-card-label">Delivered</div></div>
      </div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.5rem">Recent Orders</h2>
      <div id="recentOrders"><div style="color:var(--muted);text-align:center;padding:2rem">Loading...</div></div>
    </div>

    <!-- Orders Panel -->
    <div id="ordersPanel" style="display:none">
      <div class="admin-header">
        <h1>Orders</h1>
        <select id="orderStatusFilter" class="shop-sort" onchange="loadOrders()">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div id="allOrdersTable"><div style="color:var(--muted);text-align:center;padding:2rem">Loading...</div></div>
    </div>

    <!-- Products Panel -->
    <div id="productsPanel" style="display:none">
      <div class="admin-header">
        <h1>Products</h1>
        <button class="btn-primary" style="font-size:.85rem;padding:.6rem 1.5rem" onclick="openAddProduct()">+ Add Product</button>
      </div>
      <div id="productsTable"><div style="color:var(--muted);text-align:center;padding:2rem">Loading...</div></div>
    </div>

    <!-- Customers Panel -->
    <div id="customersPanel" style="display:none">
      <div class="admin-header"><h1>Customers</h1></div>
      <div id="customersTable"><div style="color:var(--muted);text-align:center;padding:2rem">Loading...</div></div>
    </div>

  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
async function adminLogin(e) {
  e.preventDefault();
  try {
    const data = await API.post('/users/login', { email: document.getElementById('aEmail').value, password: document.getElementById('aPass').value });
    if (data.user.role !== 'admin') {
      showToast('Admin access required', 'error'); return;
    }
    Auth.login(data.token, data.user);
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'grid';
    document.getElementById('adminDateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    loadStats();
    loadRecentOrders();
  } catch (err) {
    // Demo fallback
    if (document.getElementById('aEmail').value === 'admin@ceylongold.com') {
      document.getElementById('adminLogin').style.display = 'none';
      document.getElementById('adminDashboard').style.display = 'grid';
      document.getElementById('adminDateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      loadProducts();
    } else {
      showToast(err.message, 'error');
    }
  }
}

function adminLogout() {
  Auth.logout();
  document.getElementById('adminDashboard').style.display = 'none';
  document.getElementById('adminLogin').style.display = 'flex';
}

function showPanel(id, link) {
  document.querySelectorAll('[id$="Panel"]').forEach(p => p.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.admin-nav a').forEach(a => a.classList.remove('active'));
  link.classList.add('active');
  if (id === 'ordersPanel') loadOrders();
  if (id === 'productsPanel') loadProducts();
  if (id === 'customersPanel') loadCustomers();
}

async function loadStats() {
  try {
    const data = await API.get('/orders/stats');
    const s = data.stats;
    document.getElementById('statsCards').innerHTML = `
      <div class="stat-card"><div class="stat-card-num gold">${s.totalOrders}</div><div class="stat-card-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-card-num gold">$${s.totalRevenue.toFixed(2)}</div><div class="stat-card-label">Revenue</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:#F5A623">${s.pending}</div><div class="stat-card-label">Pending</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:#27AE60">${s.delivered}</div><div class="stat-card-label">Delivered</div></div>
    `;
  } catch {
    document.getElementById('statsCards').innerHTML = `
      <div class="stat-card"><div class="stat-card-num gold">—</div><div class="stat-card-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-card-num gold">—</div><div class="stat-card-label">Revenue</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:#F5A623">—</div><div class="stat-card-label">Pending</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:#27AE60">—</div><div class="stat-card-label">Delivered</div></div>
    `;
  }
}

async function loadRecentOrders() {
  try {
    const data = await API.get('/orders?limit=5');
    renderOrdersTable(data.orders, 'recentOrders');
  } catch { document.getElementById('recentOrders').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">Connect to MongoDB to see real data</div>'; }
}

async function loadOrders() {
  const status = document.getElementById('orderStatusFilter')?.value || '';
  try {
    const data = await API.get(`/orders?${status ? 'status=' + status : ''}&limit=50`);
    renderOrdersTable(data.orders, 'allOrdersTable');
  } catch { document.getElementById('allOrdersTable').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">Connect to MongoDB to see real data</div>'; }
}

function renderOrdersTable(orders, containerId) {
  if (!orders || orders.length === 0) {
    document.getElementById(containerId).innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">No orders found</div>';
    return;
  }
  document.getElementById(containerId).innerHTML = `
    <table class="data-table">
      <thead><tr><th>Order #</th><th>Customer</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${orders.map(o => `
        <tr>
          <td style="color:var(--gold);font-weight:600">${o.orderNumber}</td>
          <td>${o.shipping?.firstName} ${o.shipping?.lastName}<br><span style="font-size:.75rem">${o.shipping?.email}</span></td>
          <td>${new Date(o.createdAt).toLocaleDateString()}</td>
          <td>${o.items?.length || '—'} item(s)</td>
          <td>$${o.total?.toFixed(2)}</td>
          <td><span class="status-badge status-${o.status}">${o.status}</span></td>
          <td>
            <select class="shop-sort" style="font-size:.72rem;padding:.3rem" onchange="updateStatus('${o._id}', this.value)">
              <option>Update</option>
              <option value="confirmed">Confirm</option>
              <option value="processing">Processing</option>
              <option value="shipped">Shipped</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancel</option>
            </select>
          </td>
        </tr>
      `).join('')}</tbody>
    </table>`;
}

async function updateStatus(id, status) {
  if (!status || status === 'Update') return;
  try {
    await API.patch(`/orders/${id}/status`, { status });
    showToast(`Order updated to: ${status}`, 'success');
    loadOrders();
  } catch (err) { showToast(err.message, 'error'); }
}

async function loadProducts() {
  try {
    const data = await API.get('/products');
    const products = data.success ? data.products : STATIC_PRODUCTS;
    document.getElementById('productsTable').innerHTML = `
      <table class="data-table">
        <thead><tr><th>Product</th><th>Grade</th><th>Price</th><th>Category</th><th>Stock</th><th>Featured</th></tr></thead>
        <tbody>${products.map(p => `
          <tr>
            <td>${p.emoji} <strong>${p.name}</strong></td>
            <td>${p.grade}</td>
            <td style="color:var(--gold)">$${parseFloat(p.price).toFixed(2)} / ${p.unit}</td>
            <td><span class="status-badge" style="background:rgba(201,168,76,.1);color:var(--gold)">${p.category}</span></td>
            <td>${p.stockQty !== undefined ? p.stockQty : '—'}</td>
            <td>${p.featured ? '⭐' : '—'}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  } catch { document.getElementById('productsTable').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">Error loading products</div>'; }
}

async function loadCustomers() {
  try {
    const data = await API.get('/users?limit=50');
    const users = data.users || [];
    if (users.length === 0) {
      document.getElementById('customersTable').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">No customers yet</div>'; return;
    }
    document.getElementById('customersTable').innerHTML = `
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Orders</th><th>Joined</th><th>Status</th></tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td><strong>${u.firstName} ${u.lastName}</strong></td>
            <td style="color:var(--muted)">${u.email}</td>
            <td>${u.totalOrders || 0}</td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
            <td><span class="status-badge ${u.isActive ? 'status-confirmed' : 'status-cancelled'}">${u.isActive ? 'Active' : 'Inactive'}</span></td>
          </tr>
        `).join('')}</tbody>
      </table>`;
  } catch { document.getElementById('customersTable').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">Connect to MongoDB to see customers</div>'; }
}

// Check if admin already logged in
if (Auth.isLoggedIn() && Auth.user?.role === 'admin') {
  document.getElementById('adminLogin').style.display = 'none';
  document.getElementById('adminDashboard').style.display = 'grid';
  loadStats(); loadRecentOrders();
}
</script>
</body>
</html>
